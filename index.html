<script>
// ═══════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════
function parseTime(raw){
  const d=raw.replace(/\D/g,'');
  if(!d)return'';
  let h,m;
  if(d.length<=2){h=d;m='00';}
  else{h=d.slice(0,d.length-2);m=d.slice(-2);}
  const hh=Math.min(parseInt(h)||0,23).toString().padStart(2,'0');
  const mm=Math.min(parseInt(m)||0,59).toString().padStart(2,'0');
  return hh+':'+mm;
}
function toMin(t){
  if(!t||!t.includes(':'))return null;
  const[h,m]=t.split(':').map(Number);return h*60+m;
}
function dayHours(row){
  const mf=toMin(row.mf),mt=toMin(row.mt),af=toMin(row.af),at=toMin(row.at);
  const mor=(mf!==null&&mt!==null&&mt>mf)?mt-mf:0;
  const aft=(af!==null&&at!==null&&at>af)?at-af:0;
  const tot=mor+aft;
  return tot>0?parseFloat((tot/60).toFixed(2)):0;
}
function fmt2(n){return n.toFixed(2);}

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
function emptyRow(){return{date:'',mf:'',mt:'',af:'',at:'',travel:'',obs:''};}
function emptyForm(){return{
  projNr:'',addr:'',orderNr:'',name:'',machNr:'',type:'',
  svc:{startup:false,trouble:false,training:false,warranty:false,retool:false,maint:false,others:false},
  rows:[0,1,2,3,4,5].map(emptyRow),
  fault:'',cause:'',solution:'',additionalReport:false,
  techName:'',placeDate:''
};}

// Folio stored in localStorage so it persists between sessions
function getFolio(){return parseInt(localStorage.getItem('gsn_folio')||'2441');}
function bumpFolio(){const n=getFolio()+1;localStorage.setItem('gsn_folio',n);return n;}

let state={form:emptyForm(),step:0,folio:getFolio(),generating:false,pdfDone:false};

// ═══════════════════════════════════════════════════════════
// RENDER ENGINE  (lightweight, full re-render on state change)
// ═══════════════════════════════════════════════════════════
const app=document.getElementById('app');
function setState(patch){
  Object.assign(state,patch);
  render();
}
function setForm(patch){
  state.form=Object.assign({},state.form,patch);
  render();
}
function setRow(i,patch){
  const rows=[...state.form.rows];
  rows[i]=Object.assign({},rows[i],patch);
  setForm({rows});
}

// STYLES (shared)
// ═══════════════════════════════════════════════════════════
const INP='width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #d0d7e3;font-size:15px;background:#f8fafd;color:#1a2a4a;margin-bottom:2px;';
const LBL='display:block;font-size:11px;font-weight:700;color:#3a5080;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;';
const SEC='font-size:13px;font-weight:700;color:#1a3a6b;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #1a3a6b;padding-bottom:4px;';

// ═══════════════════════════════════════════════════════════
// PDF GENERATION
// ═══════════════════════════════════════════════════════════

      ${checkBox(form.svc[k])} ${svcMap[k]}

  <div style="font-family:Arial,Helvetica,sans-serif;font-size:9.5px;width:740px;padding:28px 32px;background:white;color:#000">
    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">

        <div style="border-top:1.5px solid #000;padding-top:4px;font-size:8px;line-height:1.6;color:#333">
          Blvd. Peñaflor No. 1102 Lote 16 Business Park Novatec, Col. Ciudad del Sol<br>
          C.P. 76116 Querétaro, Qro. México. &nbsp;R.F.C. GMA-070815-3R1<br>
          Tel: +52 442 209 5145 &nbsp;&nbsp; www.gsn-mexico.com &nbsp;&nbsp; mexico@gsn-service.com
        </div>
      </div>
      <div style="text-align:center;margin-left:24px">
        <div style="background:#1a3a6b;color:white;width:82px;padding:7px 0 5px;border-radius:4px;margin-bottom:3px">
          <div style="font-size:19px;font-weight:900;letter-spacing:5px;font-family:Arial Black,sans-serif">GSN</div>
          <div style="font-size:6.5px;letter-spacing:.5px;opacity:.75">SU SOCIO EN TECNOLOGÍA</div>
        </div>
        <div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-top:4px">
          <span style="font-size:9px;color:#cc0000;font-weight:bold">Nº</span>
          <span style="font-size:22px;font-weight:900;color:#cc0000;font-family:Arial Black,sans-serif">${folio}</span>
        </div>
      </div>
    </div>

    <!-- Fields -->
    <div style="display:flex;gap:20px;margin-bottom:10px">
      <div style="flex:1">
        <div style="font-size:14px;font-weight:bold;margin-bottom:5px">CUSTOMER SERVICE ORDER</div>
        <div style="margin-bottom:4px;font-size:9px">Project Nr: <span style="border-bottom:1px solid #000;display:inline-block;min-width:170px">${form.projNr}</span></div>
        <div style="margin-bottom:2px;font-size:9px">Customer address - Client:</div>
        <div style="border:1px solid #999;min-height:58px;padding:4px 6px;font-size:8.5px;background:#fafafa;white-space:pre-wrap">${form.addr}</div>
      </div>
      <div style="flex:1">

        <div style="margin-bottom:6px;font-size:9px"><b>Type:</b> <span style="border-bottom:1px solid #000;display:inline-block;min-width:160px">${form.type}</span></div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;row-gap:2px;column-gap:6px">${svcChecks}</div>
      </div>
    </div>

    <!-- Hours table -->
    <table style="width:100%;border-collapse:collapse;margin-bottom:10px;font-size:8.5px">
      <thead>
        <tr>
          <th rowspan="2" style="border:1px solid #888;padding:3px 5px;text-align:center;font-weight:bold;background:#d8d8d8">Date 20</th>
          <th colspan="2" style="border:1px solid #888;padding:3px 5px;text-align:center;font-weight:bold;background:#d8d8d8">Morning</th>
          <th colspan="2" style="border:1px solid #888;padding:3px 5px;text-align:center;font-weight:bold;background:#d8d8d8">Afternoon</th>
          <th rowspan="2" style="border:1px solid #888;padding:3px 5px;text-align:center;font-weight:bold;background:#d8d8d8">Total hrs</th>
          <th rowspan="2" style="border:1px solid #888;padding:3px 5px;text-align:center;font-weight:bold;background:#d8d8d8">Travel hrs</th>
          <th rowspan="2" style="border:1px solid #888;padding:3px 5px;text-align:center;font-weight:bold;background:#d8d8d8;width:28%">Observation</th>
        </tr>
        <tr>
          <th style="border:1px solid #888;padding:3px 5px;text-align:center;background:#d8d8d8;font-size:7.5px">From</th>
          <th style="border:1px solid #888;padding:3px 5px;text-align:center;background:#d8d8d8;font-size:7.5px">To</th>
          <th style="border:1px solid #888;padding:3px 5px;text-align:center;background:#d8d8d8;font-size:7.5px">From</th>
          <th style="border:1px solid #888;padding:3px 5px;text-align:center;background:#d8d8d8;font-size:7.5px">To</th>
        </tr>
      </thead>
      <tbody>
        ${rows}
        <tr style="background:#d0d0d0;font-weight:bold">

          <td style="border:1px solid #888;padding:3px 5px;text-align:center">${fmt2(totalWork)}</td>
          <td style="border:1px solid #888;padding:3px 5px;text-align:center">${fmt2(totalTravel)}</td>
          <td style="border:1px solid #888"></td>
        </tr>
      </tbody>
    </table>

    <!-- Fault/Cause/Solution -->
    <div style="margin-bottom:8px"><b style="font-size:9px">Fault:</b><div style="border-bottom:1px solid #bbb;min-height:22px;padding:2px 4px;font-size:8.5px;margin-top:1px">${form.fault}</div><div style="border-bottom:1px solid #bbb;min-height:16px"></div></div>
    <div style="margin-bottom:8px"><b style="font-size:9px">Cause:</b><div style="border-bottom:1px solid #bbb;min-height:22px;padding:2px 4px;font-size:8.5px;margin-top:1px">${form.cause}</div><div style="border-bottom:1px solid #bbb;min-height:16px"></div></div>
    <div style="margin-bottom:8px"><b style="font-size:9px">Solution:</b><div style="border-bottom:1px solid #bbb;min-height:22px;padding:2px 4px;font-size:8.5px;margin-top:1px">${form.solution}</div><div style="border-bottom:1px solid #bbb;min-height:16px"></div><div style="border-bottom:1px solid #bbb;min-height:16px"></div></div>

    <!-- Additional report -->
    <div style="text-align:right;margin-bottom:14px;font-size:8.5px">
      ${checkBox(form.additionalReport)} Additional report
    </div>

    <!-- Signatures -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-top:6px">
      <div>
        <div style="font-size:8.5px;font-weight:bold;margin-bottom:4px">GSN (Name & Signature)</div>
        <div style="border-top:1px solid #000;min-height:42px;padding:4px 2px;font-size:8.5px">${form.techName}</div>
      </div>
      <div style="text-align:center">

        <div style="border-top:1px solid #000;min-height:42px;padding:4px 2px;font-size:8.5px">${form.placeDate}</div>
      </div>
      <div>
        <div style="font-size:8.5px;font-weight:bold;margin-bottom:4px;text-align:right">Client (Name & Signature)</div>
        <div style="border-top:1px solid #000;min-height:42px"></div>
      </div>
    </div>

    <!-- Footer -->
    <div style="margin-top:14px;font-size:7.5px;border-top:1px solid #ccc;padding-top:5px;color:#555">
      <b>Attention:</b> With the customer's signature all the work hours on this time sheet are legally recognized. Subsequent claims cannot be accepted.
    </div>
  </div>`;
}

function triggerPrint(form,folio){
  const area=document.getElementById('print-area');
  area.innerHTML=buildPrintHTML(form,folio);
  area.style.display='block';
  area.style.position='static';
  setTimeout(()=>{
    window.print();
    setTimeout(()=>{
      area.style.display='none';
      area.style.position='absolute';
    },500);
  },200);
}

// ═══════════════════════════════════════════════════════════
// STEP RENDERERS
// ═══════════════════════════════════════════════════════════
function stepProyecto(f){
  return `
  <div style="margin-bottom:14px"><label style="${LBL}">Project Nr.</label>
    <input style="${INP}" placeholder="Ej. 2024-001" value="${esc(f.projNr)}" oninput="setForm({projNr:this.value})"></div>
  <div style="margin-bottom:14px"><label style="${LBL}">Customer Order Number</label>
    <input style="${INP}" placeholder="Número de orden del cliente" value="${esc(f.orderNr)}" oninput="setForm({orderNr:this.value})"></div>
  <div style="margin-bottom:14px"><label style="${LBL}">Nombre del Contacto</label>
    <input style="${INP}" placeholder="Nombre completo" value="${esc(f.name)}" oninput="setForm({name:this.value})"></div>
  <div style="margin-bottom:14px"><label style="${LBL}">Machine Nr.</label>
    <input style="${INP}" placeholder="Número de máquina" value="${esc(f.machNr)}" oninput="setForm({machNr:this.value})"></div>
  <div style="margin-bottom:14px"><label style="${LBL}">Type / Modelo</label>

  <div style="margin-bottom:14px"><label style="${LBL}">Dirección del Cliente</label>
    <textarea style="${INP}resize:vertical;min-height:80px" placeholder="Dirección completa..." oninput="setForm({addr:this.value})">${esc(f.addr)}</textarea></div>`;
}

const SVC_LIST=[
  ['startup','Machine Start Up','🔧'],['trouble','Troubleshooting','🔍'],['training','Training','📚'],
  ['warranty','Warranty','🛡️'],['retool','Retooling','⚙️'],['maint','Maintenance','🔩'],['others','Others','📋']
];
function stepServicio(f){
  return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
    SVC_LIST.map(([k,label,icon])=>{
      const on=f.svc[k];
      return `<button onclick="toggleSvc('${k}')" style="padding:14px 10px;border-radius:12px;
        border:${on?'2px solid #1a3a6b':'1.5px solid #d0d7e3'};
        background:${on?'#e8eef8':'#f8fafd'};
        text-align:left;display:flex;align-items:center;gap:8px;width:100%">
        <span style="font-size:20px">${icon}</span>
        <div>
          <div style="font-size:12px;font-weight:700;color:${on?'#1a3a6b':'#555'}">${label}</div>
          ${on?'<div style="font-size:10px;color:#1a3a6b">✓ Seleccionado</div>':''}
        </div>
      </button>`;
    }).join('')+'</div>';
}

function timeInputHTML(val,onblur_fn,ph){
  return `<input type="text" inputmode="numeric"
    style="width:100%;padding:9px 6px;border-radius:8px;border:1.5px solid #d0d7e3;font-size:14px;background:#f8fafd;color:#1a2a4a;text-align:center;font-family:monospace;box-sizing:border-box"
    placeholder="${ph}" value="${esc(val)}"
    onblur="${onblur_fn}">`;
}

function stepHoras(f){
  const totalWork=f.rows.reduce((s,r)=>s+dayHours(r),0);
  const totalTravel=f.rows.reduce((s,r)=>s+(parseFloat(r.travel)||0),0);

  const rowsHTML=f.rows.map((r,i)=>{
    const dh=dayHours(r);
    return `

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-family:monospace;font-size:11px;color:#1a3a6b;font-weight:700">DÍA ${i+1}</span>
        <span style="background:${dh>0?'#1a3a6b':'#ccc'};color:white;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700">
          ${dh>0?fmt2(dh)+' h':'sin datos'}
        </span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><label style="${LBL}font-size:10px">Fecha (DD/MM)</label>
          <input style="${INP}margin-bottom:0;font-family:monospace" placeholder="14/04"
            value="${esc(r.date)}" oninput="setRow(${i},{date:this.value})"></div>
        <div><label style="${LBL}font-size:10px">Observación</label>
          <input style="${INP}margin-bottom:0" placeholder="Nota..."
            value="${esc(r.obs)}" oninput="setRow(${i},{obs:this.value})"></div>
        <div><label style="${LBL}font-size:10px">🌅 Mañana (de – a)</label>
          <div style="display:flex;gap:5px;align-items:center">
            ${timeInputHTML(r.mf,`blurTime(${i},'mf',this.value)`,'0800')}
            <span style="color:#aaa">–</span>
            ${timeInputHTML(r.mt,`blurTime(${i},'mt',this.value)`,'1200')}
          </div></div>
        <div><label style="${LBL}font-size:10px">🌇 Tarde (de – a)</label>
          <div style="display:flex;gap:5px;align-items:center">
            ${timeInputHTML(r.af,`blurTime(${i},'af',this.value)`,'1300')}
            <span style="color:#aaa">–</span>
            ${timeInputHTML(r.at,`blurTime(${i},'at',this.value)`,'1700')}
          </div></div>
        <div><label style="${LBL}font-size:10px">Total Horas (auto)</label>
          <div style="padding:10px;border-radius:8px;background:${dh>0?'#ddeeff':'#ebebeb'};font-size:17px;font-weight:700;color:#1a3a6b;font-family:monospace;text-align:center">
            ${dh>0?fmt2(dh)+' h':'—'}
          </div></div>
        <div><label style="${LBL}font-size:10px">Horas Viaje</label>
          <input type="number" step="0.5" min="0"
            style="${INP}margin-bottom:0;font-family:monospace;text-align:center"
            placeholder="0" value="${esc(r.travel)}"
            oninput="setRow(${i},{travel:this.value})"></div>
      </div>
    </div>`;
  }).join('');

  return rowsHTML+`
  <div style="background:#1a3a6b;color:white;border-radius:12px;padding:14px 20px;display:flex;justify-content:space-around">
    <div style="text-align:center">
      <div style="font-size:10px;opacity:.65;margin-bottom:2px">TOTAL TRABAJO</div>
      <div style="font-family:monospace;font-size:24px;font-weight:700">${fmt2(totalWork)}h</div>
    </div>
    <div style="width:1px;background:rgba(255,255,255,.2)"></div>
    <div style="text-align:center">
      <div style="font-size:10px;opacity:.65;margin-bottom:2px">TOTAL VIAJE</div>
      <div style="font-family:monospace;font-size:24px;font-weight:700">${fmt2(totalTravel)}h</div>
    </div>
  </div>`;
}

function stepReporte(f){
  const fields=[
    ['fault','🔴 Fault / Falla','Describir la falla encontrada...'],
    ['cause','🟡 Cause / Causa','Describir la causa raíz...'],
    ['solution','🟢 Solution / Solución','Describir la solución aplicada...']
  ];
  const on=f.additionalReport;
  return fields.map(([k,label,ph])=>`
    <div style="margin-bottom:16px"><label style="${LBL}">${label}</label>
      <textarea style="${INP}resize:vertical;min-height:90px" placeholder="${ph}"
        oninput="setForm({${k}:this.value})">${esc(f[k])}</textarea></div>`).join('')+
  `<button onclick="setForm({additionalReport:${!on}})" style="width:100%;padding:14px;border-radius:10px;
    border:${on?'2px solid #1a3a6b':'1.5px solid #d0d7e3'};
    background:${on?'#e8eef8':'#f8fafd'};
    display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;color:${on?'#1a3a6b':'#666'}">
    <span style="font-size:20px">${on?'☑️':'⬜'}</span>
    Additional Report / Reporte Adicional
  </button>`;
}

function stepCierre(f){
  const totalWork=f.rows.reduce((s,r)=>s+dayHours(r),0);
  const done=state.pdfDone;
  return `
  <div style="margin-bottom:14px"><label style="${LBL}">Nombre del Técnico GSN</label>
    <input style="${INP}" placeholder="Nombre completo del técnico" value="${esc(f.techName)}" oninput="setForm({techName:this.value})"></div>
  <div style="margin-bottom:20px"><label style="${LBL}">Lugar y Fecha</label>
    <input style="${INP}" placeholder="Ej. Querétaro, 14 Abril 2026" value="${esc(f.placeDate)}" oninput="setForm({placeDate:this.value})"></div>

  <div style="background:#fff8e1;border:1.5px solid #f0c040;border-radius:12px;padding:14px 16px;margin-bottom:20px;display:flex;gap:10px;align-items:flex-start">
    <span style="font-size:22px">✍️</span>
    <div>
      <div style="font-size:13px;font-weight:700;color:#7a5800;margin-bottom:3px">Firma del cliente</div>
      <div style="font-size:12px;color:#7a5800;line-height:1.5">El espacio de firma se deja en blanco en el PDF.<br>Genera el reporte y envíalo al cliente para que lo firme.</div>
    </div>
  </div>

  <div style="background:#1a3a6b;color:white;border-radius:14px;padding:16px">
    <div style="font-size:11px;opacity:.65;margin-bottom:8px">RESUMEN DEL SERVICIO</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">
      <div><span style="opacity:.6">Folio:</span> <strong>#${state.folio}</strong></div>
      <div><span style="opacity:.6">Máquina:</span> <strong>${esc(f.machNr)||'—'}</strong></div>
      <div><span style="opacity:.6">Cliente:</span> <strong>${esc(f.name)||'—'}</strong></div>
      <div><span style="opacity:.6">Horas:</span> <strong>${fmt2(totalWork)}h</strong></div>
    </div>
  </div>
  ${done?`<div style="margin-top:14px;background:#e8f5e9;border:1px solid #4caf50;border-radius:10px;padding:13px;text-align:center;color:#2e7d32">
    <div style="font-size:14px;font-weight:700;margin-bottom:3px">✅ PDF generado</div>
    <div style="font-size:11px">Elige "Guardar como PDF" en el diálogo de impresión</div>
  </div>`:''}`;
}

// ═══════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════
const STEPS=['Proyecto','Servicio','Horas','Reporte','Cierre'];
const STEP_ICONS=['📋','⚙️','🕐','📝','✅'];

function render(){
  const {form,step,folio}=state;
  const tabs=STEPS.map((s,i)=>{
    const active=step===i;const done=step>i;
    return `<button onclick="goStep(${i})" style="flex:1;padding:5px 2px;border-radius:6px;border:none;
      background:${active?'#fff':done?'rgba(255,255,255,.35)':'rgba(255,255,255,.12)'};
      color:${active?'#1a3a6b':done?'#c8daf5':'#7fa8d4'};
      font-size:8.5px;font-weight:${active?'700':'500'};text-transform:uppercase;cursor:pointer">${s}</button>`;
  }).join('');

  let content='';
  const sec=(title)=>`<div style="${SEC}">${title}</div>`;
  if(step===0)content=sec('Información del Proyecto')+stepProyecto(form);
  else if(step===1)content=sec('Tipo de Servicio')+stepServicio(form);
  else if(step===2)content=sec('Registro de Horas')+`
    <div style="font-size:11px;color:#555;margin-bottom:12px;background:#e8f0fa;border-radius:8px;padding:9px 12px;line-height:1.6">
      💡 Escribe sin dos puntos: <b>800</b> → 08:00 · <b>1730</b> → 17:30<br>El total diario se calcula solo al salir del campo.
    </div>`+stepHoras(form);
  else if(step===3)content=sec('Reporte Técnico')+stepReporte(form);
  else if(step===4)content=sec('Datos de Cierre')+stepCierre(form);

  const isLast=step===STEPS.length-1;
  const backBtn=step>0?`<button onclick="goStep(${step-1})" style="flex:1;padding:13px;border-radius:12px;border:1.5px solid #1a3a6b;background:white;color:#1a3a6b;font-size:15px;font-weight:600">← Atrás</button>`:'';
  const nextBtn=isLast
    ?`<div style="flex:2;display:flex;gap:8px">
        <button onclick="doPDF()" style="flex:2;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#cc0000,#880000);color:white;font-size:14px;font-weight:700">
          📄 Generar PDF
        </button>
        <button onclick="doReset()" style="flex:1;padding:13px;border-radius:12px;border:1.5px solid #cc0000;background:white;color:#cc0000;font-size:13px;font-weight:600">Nuevo</button>
      </div>`
    :`<button onclick="goStep(${step+1})" style="flex:2;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#1a3a6b,#0d2244);color:white;font-size:15px;font-weight:700">Siguiente →</button>`;

  app.innerHTML=`
  <!-- Header -->
  <div style="background:linear-gradient(135deg,#1a3a6b 0%,#0d2244 100%);padding:20px 20px 14px;color:white;padding-top:calc(20px + env(safe-area-inset-top,0px))">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-family:monospace;font-size:10px;color:#7fa8d4;letter-spacing:2px;margin-bottom:2px">CUSTOMER SERVICE ORDER</div>
        <div style="font-size:21px;font-weight:700">GSN Maquinaria</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:10px;color:#7fa8d4">FOLIO</div>
        <div style="font-family:monospace;font-size:26px;font-weight:700;color:#ff4444">#${folio}</div>
      </div>
    </div>
    <div style="display:flex;gap:5px;margin-top:14px">${tabs}</div>
  </div>

  <!-- Content -->
  <div style="flex:1;padding:20px 16px 110px;overflow-y:auto">
    ${content}
  </div>

  <!-- Bottom nav -->
  <div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:white;border-top:1px solid #e0e8f0;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));display:flex;gap:10px;box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:100">
    ${backBtn}
    ${nextBtn}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// GLOBAL HANDLERS (called from inline HTML)
// ═══════════════════════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
window.goStep=i=>setState({step:i});
window.setForm=patch=>setForm(patch);
window.setRow=(i,patch)=>setRow(i,patch);
window.toggleSvc=k=>{const svc=Object.assign({},state.form.svc);svc[k]=!svc[k];setForm({svc});};
window.blurTime=(i,field,raw)=>{const fmt=parseTime(raw);setRow(i,{[field]:fmt});};
window.doPDF=()=>{
  triggerPrint(state.form,state.folio);
  bumpFolio();
  setState({pdfDone:true,folio:getFolio()});
};
window.doReset=()=>setState({form:emptyForm(),step:0,pdfDone:false});

// ═══════════════════════════════════════════════════════════
// PWA INSTALL PROMPT
// ═══════════════════════════════════════════════════════════
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('btn-install').addEventListener('click',()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{deferredPrompt=null;});
  document.getElementById('install-banner').classList.remove('show');
});
document.getElementById('btn-dismiss').addEventListener('click',()=>{
  document.getElementById('install-banner').classList.remove('show');
});

// ═══════════════════════════════════════════════════════════
// SERVICE WORKER REGISTRATION
// ═══════════════════════════════════════════════════════════
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
render();
</script>
</body>
</html>
